<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服裝供售點數申報 — 衛生營後勤資訊管理系統</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0b1f3a; --accent: #2563eb; --accent-hover: #1d4ed8;
      --bg: #f0f4f8; --white: #fff; --border: #dde3ea;
      --text: #1e293b; --muted: #64748b; --green: #16a34a;
      --red: #dc2626; --green-bg: #dcfce7;
    }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

    /* Header */
    .fh { background: var(--navy); color: #fff; text-align: center; padding: 28px 20px 24px; }
    .fh-logo { font-size: 40px; margin-bottom: 8px; }
    .fh h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .fh p { font-size: 13px; color: rgba(255,255,255,0.65); }

    /* Main */
    .fmain { max-width: 560px; margin: 0 auto; padding: 28px 16px 60px; }

    /* Card */
    .fcard { background: var(--white); border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 28px; margin-bottom: 16px; }
    @media (max-width: 480px) { .fcard { padding: 18px 16px; } }

    .card-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--accent); }

    /* Form grid */
    .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 480px) { .fg { grid-template-columns: 1fr; } }
    .fg-full { grid-column: 1 / -1; }

    .fgroup { display: flex; flex-direction: column; gap: 5px; }
    .fgroup label { font-size: 13px; font-weight: 600; color: var(--text); }
    .req { color: var(--red); }
    .fgroup input, .fgroup select {
      padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none; background: #fff;
      transition: border-color 0.2s;
    }
    .fgroup input:focus, .fgroup select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .fgroup input[readonly] { background: var(--bg); color: var(--muted); cursor: not-allowed; }
    .ferr { color: var(--red); font-size: 12px; display: none; margin-top: 3px; }
    .fgroup.has-error input, .fgroup.has-error select { border-color: var(--red); }
    .fgroup.has-error .ferr { display: block; }

    /* Hint */
    .calc-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Divider */
    .fdivider { height: 1px; background: var(--border); margin: 8px 0 20px; }

    /* Submit */
    .fnav { display: flex; justify-content: flex-end; }
    .btn { padding: 11px 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.15s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-big { padding: 13px 40px; font-size: 15px; width: 100%; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Success screen */
    #success-screen { display: none; text-align: center; padding: 40px 20px; }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    .success-msg { font-size: 14px; color: var(--muted); line-height: 1.8; }
    .success-detail {
      display: inline-block; background: var(--bg); border-radius: 10px;
      padding: 14px 24px; margin: 18px 0; text-align: left;
      border: 1px solid var(--border);
    }
    .success-detail p { font-size: 13px; color: var(--text); line-height: 2; }
    .success-detail strong { color: var(--accent); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* Loading overlay */
    #submitting-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center; flex-direction: column; gap: 16px; color: #fff;
    }
    #submitting-overlay.show { display: flex; }
    .spin { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="fh">
  <div class="fh-logo">👕</div>
  <h1>服裝供售點數申報</h1>
  <p>衛生營後勤資訊管理系統</p>
</div>

<div class="fmain">

  <!-- ══ 成功畫面 ══ -->
  <div class="fcard" id="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">申報完成！</div>
    <div class="success-detail">
      <p>姓名：<strong id="s-name"></strong></p>
      <p>單位：<strong id="s-unit"></strong></p>
      <p>配額點數：<strong id="s-quota"></strong> 點</p>
      <p>剩餘點數：<strong id="s-remaining"></strong> 點</p>
      <p>使用點數：<strong id="s-used"></strong> 點</p>
      <p>填寫時間：<strong id="s-time"></strong></p>
    </div>
    <div class="success-msg">資料已送出，承辦人將進行確認。</div>
    <br>
    <button class="btn btn-primary" style="margin-top:8px" onclick="location.reload()">重新填寫</button>
  </div>

  <!-- ══ 表單 ══ -->
  <div id="form-wrap">
    <div class="fcard">
      <div class="card-title">👤 人員資訊</div>
      <div class="fg">
        <div class="fgroup">
          <label>單位 <span class="req">*</span></label>
          <select id="f-unit">
            <option value="">請選擇</option>
            <option>衛生營營部</option>
            <option>衛生營第一連</option>
            <option>衛生營第二連</option>
          </select>
          <span class="ferr">請選擇單位</span>
        </div>
        <div class="fgroup">
          <label>姓名 <span class="req">*</span></label>
          <input type="text" id="f-name" placeholder="請輸入您的姓名" autocomplete="name">
          <span class="ferr">請輸入姓名</span>
        </div>
      </div>
    </div>

    <div class="fcard">
      <div class="card-title">📊 點數資訊</div>
      <div class="fg">
        <div class="fgroup">
          <label>配額點數 <span class="req">*</span></label>
          <input type="number" id="f-quota" min="0" placeholder="0" inputmode="numeric">
          <span class="ferr">請輸入配額點數</span>
        </div>
        <div class="fgroup">
          <label>剩餘點數 <span class="req">*</span></label>
          <input type="number" id="f-remaining" min="0" placeholder="0" inputmode="numeric">
          <span class="ferr">請輸入剩餘點數</span>
        </div>
        <div class="fgroup fg-full">
          <label>使用點數（自動計算）</label>
          <input type="number" id="f-used" readonly placeholder="—">
          <div class="calc-hint">使用點數 ＝ 配額點數 − 剩餘點數</div>
        </div>
      </div>
    </div>

    <div class="fcard" style="padding: 20px 28px;">
      <button class="btn btn-primary btn-big" id="submitBtn">✔ 送出申報</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>
<div id="submitting-overlay"><div class="spin"></div><div>送出中，請稍候…</div></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getFirestore, initializeFirestore, persistentLocalCache,
    collection, addDoc, serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // ── Firebase ──
  const app = initializeApp({
    apiKey: 'AIzaSyAtPU5Dsf5opwqlOUVn6QzKVJ1JTNhYfzM',
    authDomain: 'medical-logistics-system-dc1cd.firebaseapp.com',
    projectId: 'medical-logistics-system-dc1cd',
    storageBucket: 'medical-logistics-system-dc1cd.firebasestorage.app',
    messagingSenderId: '642469138148',
    appId: '1:642469138148:web:4aac96ce35d32d8132a6f1',
  });

  let db;
  try { db = initializeFirestore(app, { localCache: persistentLocalCache() }); }
  catch { db = getFirestore(app); }

  const COL = collection(db, 'uniformPoints');

  // ── Toast ──
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  // ── Auto-calc 使用點數 ──
  function calcUsed() {
    const q = Number(document.getElementById('f-quota').value)     || 0;
    const r = Number(document.getElementById('f-remaining').value) || 0;
    document.getElementById('f-used').value = q - r;
  }
  document.getElementById('f-quota').addEventListener('input', calcUsed);
  document.getElementById('f-remaining').addEventListener('input', calcUsed);

  // ── Validate ──
  function validate() {
    let ok = true;
    const fields = [
      { id: 'f-unit',      msg: '請選擇單位' },
      { id: 'f-name',      msg: '請輸入姓名' },
      { id: 'f-quota',     msg: '請輸入配額點數' },
      { id: 'f-remaining', msg: '請輸入剩餘點數' },
    ];
    fields.forEach(({ id, msg }) => {
      const g = document.getElementById(id).closest('.fgroup');
      if (!document.getElementById(id).value.toString().trim()) {
        g.classList.add('has-error');
        g.querySelector('.ferr').textContent = msg;
        ok = false;
      } else {
        g.classList.remove('has-error');
      }
    });
    return ok;
  }

  // ── Submit ──
  document.getElementById('submitBtn').addEventListener('click', async () => {
    if (!validate()) { toast('請填寫所有必填欄位'); return; }

    const unit      = document.getElementById('f-unit').value;
    const ownerName = document.getElementById('f-name').value.trim();
    const quota     = Number(document.getElementById('f-quota').value);
    const remaining = Number(document.getElementById('f-remaining').value);
    const used      = quota - remaining;

    const overlay = document.getElementById('submitting-overlay');
    overlay.classList.add('show');
    document.getElementById('submitBtn').disabled = true;

    try {
      const now = serverTimestamp();
      await addDoc(COL, {
        personnelId: null,
        ownerName,
        unit,
        quota,
        remaining,
        used,
        submittedAt: now,
        source: 'public-form',
      });

      // Show success screen
      const timeStr = new Date().toLocaleString('zh-TW', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
      document.getElementById('s-name').textContent      = ownerName;
      document.getElementById('s-unit').textContent      = unit;
      document.getElementById('s-quota').textContent     = quota;
      document.getElementById('s-remaining').textContent = remaining;
      document.getElementById('s-used').textContent      = used;
      document.getElementById('s-time').textContent      = timeStr;

      document.getElementById('form-wrap').style.display    = 'none';
      document.getElementById('success-screen').style.display = '';
    } catch (e) {
      console.error(e);
      toast('❌ 送出失敗，請稍後再試');
      document.getElementById('submitBtn').disabled = false;
    } finally {
      overlay.classList.remove('show');
    }
  });

  // Clear error on input
  ['f-unit','f-name','f-quota','f-remaining'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById(id).closest('.fgroup').classList.remove('has-error');
    });
  });
</script>
</body>
</html>
